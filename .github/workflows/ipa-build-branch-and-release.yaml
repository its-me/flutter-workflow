name: ipa - build branch and release


on:
  push:
    branches:
      - main


jobs:

  ios:
    runs-on: macos-latest
    if: contains(github.event.head_commit.message, '[ios]')
    permissions:
      contents: write

    steps:
      - name: Set variables
        run: |
          TAG_NAME="${GITHUB_REF_NAME}-${GITHUB_SHA::7}"
          IPA_NAME="App-${TAG_NAME}.ipa"
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV
          echo "IPA_NAME=$IPA_NAME" >> $GITHUB_ENV

      - name: Echo variables
        run: |
          echo $TAG_NAME
          echo $IPA_NAME
