name: build and release


on:
  push:
    branches:
      - main


jobs:

  setup:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.vars.outputs.tag_name }}
      apk_name: ${{ steps.vars.outputs.apk_name }}
      ipa_name: ${{ steps.vars.outputs.ipa_name }}

    steps:
      - name: Set variables
        id: vars
        run: |
          TAG_NAME="${GITHUB_REF_NAME}-${GITHUB_SHA::7}"
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "apk_name=App-${TAG_NAME}.apk" >> $GITHUB_OUTPUT
          echo "ipa_name=App-${TAG_NAME}.ipa" >> $GITHUB_OUTPUT

  android:
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      android_build_id: ${{ steps.random.outputs.android_build_id }}
      android_checksum: ${{ steps.random.outputs.android_checksum }}

    steps:
      - name: Echo variables
        run: |
          echo "${{ needs.setup.outputs.tag_name }}"
          echo "${{ needs.setup.outputs.apk_name }}"

      - name: Generate random variables
        id: random
        run: |
          echo "android_build_id=$(openssl rand -hex 8)" >> $GITHUB_OUTPUT
          echo "android_checksum=$(openssl rand -hex 16)" >> $GITHUB_OUTPUT

  ios:
    needs: setup
    runs-on: macos-latest
    permissions:
      contents: write
    outputs:
      ios_build_id: ${{ steps.random.outputs.ios_build_id }}
      ios_checksum: ${{ steps.random.outputs.ios_checksum }}

    steps:
      - name: Echo variables
        run: |
          echo "${{ needs.setup.outputs.tag_name }}"
          echo "${{ needs.setup.outputs.ipa_name }}"

      - name: Generate random variables
        id: random
        run: |
          echo "ios_build_id=$(openssl rand -hex 8)" >> $GITHUB_OUTPUT
          echo "ios_checksum=$(openssl rand -hex 16)" >> $GITHUB_OUTPUT

  test-android:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter build apk --debug

  test-ios:
    needs: setup
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter build ipa --no-codesign

  test-web:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter build web

  test-linux:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev
          flutter build linux

  test-macos:
    needs: setup
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter build macos

  test-windows:
    needs: setup
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter build windows

  finalize:
    needs: [setup, android, ios, test-android, test-ios, test-web, test-linux, test-macos, test-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Echo all variables
        run: |
          echo "tag_name=${{ needs.setup.outputs.tag_name }}"
          echo "apk_name=${{ needs.setup.outputs.apk_name }}"
          echo "ipa_name=${{ needs.setup.outputs.ipa_name }}"
          echo "android_build_id=${{ needs.android.outputs.android_build_id }}"
          echo "android_checksum=${{ needs.android.outputs.android_checksum }}"
          echo "ios_build_id=${{ needs.ios.outputs.ios_build_id }}"
          echo "ios_checksum=${{ needs.ios.outputs.ios_checksum }}"
