name: build and release


on:
  push:
    branches:
      - main


jobs:

  setup:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.vars.outputs.tag_name }}
      release_name: ${{ steps.vars.outputs.release_name }}

    steps:
      - name: Set variables
        id: vars
        run: |
          TAG_NAME="${GITHUB_REF_NAME}-${GITHUB_SHA::7}"
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "release_name=App-${TAG_NAME}" >> $GITHUB_OUTPUT

  android:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter build apk --debug

  ios:
    needs: setup
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter build ipa --no-codesign

  web:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter build web

  linux:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev
          flutter build linux

  macos:
    needs: setup
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter build macos

  windows:
    needs: setup
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter build windows

  finalize:
    needs: [setup, android, ios, web, linux, macos, windows]
    runs-on: ubuntu-latest

    steps:
      - name: Echo all variables
        run: |
          echo "tag_name=${{ needs.setup.outputs.tag_name }}"
          echo "release_name=${{ needs.setup.outputs.release_name }}"
